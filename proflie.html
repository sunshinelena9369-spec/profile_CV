<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
  }

  .navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 999;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #ddd;
  }

  .container {
    max-width: 1200px;
    margin: auto;
    padding: 0 20px;
    height: 64px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    border: none;
    background: none;
    cursor: pointer;
  }

  .logo-box {
    width: 32px;
    height: 32px;
    background: #2563eb;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: bold;
  }

  .logo-text {
    font-size: 20px;
    font-weight: bold;
  }

  .desktop-nav {
    display: flex;
    gap: 25px;
  }

  .nav-link,
  .mobile-link {
    border: none;
    background: none;
    cursor: pointer;
    font-size: 15px;
    transition: 0.2s;
  }

  .nav-link:hover,
  .mobile-link:hover {
    color: #2563eb;
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .control-btn {
    border: none;
    background: #f3f4f6;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.2s;
  }

  .control-btn:hover {
    background: #e5e7eb;
  }

  .lang-wrapper {
    position: relative;
  }

  .lang-menu {
    position: absolute;
    top: 45px;
    right: 0;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    width: 180px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  .lang-item {
    width: 100%;
    padding: 10px;
    border: none;
    background: none;
    text-align: left;
    cursor: pointer;
  }

  .lang-item:hover {
    background: #f3f4f6;
  }

  .mobile-btn {
    display: none;
  }

  .mobile-menu {
    padding: 15px 20px;
    border-top: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: white;
  }

  .hidden {
    display: none;
  }

  .dark-mode {
    background: #111827;
    color: white;
  }

  .dark-mode .navbar {
    background: rgba(17,24,39,0.9);
    border-color: #374151;
  }

  .dark-mode .control-btn {
    background: #1f2937;
    color: white;
  }

  .dark-mode .lang-menu {
    background: #1f2937;
    color: white;
  }

  @media(max-width: 768px) {
    .desktop-nav {
      display: none;
    }

    .mobile-btn {
      display: block;
    }
  }
</style>

</head>
<body>
<!-- Navbar HTML Thuần -->
<nav id="navbar" class="navbar">
  <div class="container">
    
    <!-- Logo -->
    <button class="logo-btn" onclick="scrollToSection('home')">
      <div class="logo-box">
        <span>P</span>
      </div>
      <span class="logo-text">Portfolio</span>
    </button>

    <!-- Desktop Navigation -->
    <div class="desktop-nav">
      <button onclick="scrollToSection('home')" class="nav-link">Home</button>
      <button onclick="scrollToSection('skills')" class="nav-link">Skills</button>
      <button onclick="scrollToSection('achievements')" class="nav-link">Achievements</button>
      <button onclick="scrollToSection('contact')" class="nav-link">Contact</button>
      <button onclick="scrollToSection('cv')" class="nav-link">CV</button>
    </div>

    <!-- Controls -->
    <div class="controls">

      <!-- Theme Toggle -->
      <button id="themeToggle" class="control-btn">
        🌙
      </button>

      <!-- Language Selector -->
      <div class="lang-wrapper">
        <button id="langBtn" class="control-btn">
          🌐 <span id="currentLang">🇺🇸</span>
        </button>

        <div id="langMenu" class="lang-menu hidden">
          <button class="lang-item" onclick="changeLanguage('en','🇺🇸')">
            🇺🇸 English
          </button>

          <button class="lang-item" onclick="changeLanguage('vi','🇻🇳')">
            🇻🇳 Tiếng Việt
          </button>
        </div>
      </div>

      <!-- Mobile Menu Button -->
      <button id="mobileBtn" class="control-btn mobile-btn">
        ☰
      </button>
    </div>
  </div>

  <!-- Mobile Navigation -->
  <div id="mobileMenu" class="mobile-menu hidden">
    <button onclick="scrollToSection('home')" class="mobile-link">Home</button>
    <button onclick="scrollToSection('skills')" class="mobile-link">Skills</button>
    <button onclick="scrollToSection('achievements')" class="mobile-link">Achievements</button>
    <button onclick="scrollToSection('contact')" class="mobile-link">Contact</button>
    <button onclick="scrollToSection('cv')" class="mobile-link">CV</button>
  </div>
</nav>



</body>
</html>
